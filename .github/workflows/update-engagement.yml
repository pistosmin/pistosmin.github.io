name: Update Engagement Stats

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  discussions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      PUBLIC_GISCUS_REPO: pistosmin/pistosmin.github.io
      PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID || secrets.PUBLIC_GISCUS_REPO_ID }}
      PUBLIC_GISCUS_CATEGORY: Announcements
      PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID || secrets.PUBLIC_GISCUS_CATEGORY_ID }}
      PUBLIC_ADSENSE_CLIENT: ${{ vars.PUBLIC_ADSENSE_CLIENT || secrets.PUBLIC_ADSENSE_CLIENT }}
      PUBLIC_ADSENSE_SLOT: ${{ vars.PUBLIC_ADSENSE_SLOT || secrets.PUBLIC_ADSENSE_SLOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch engagement data
        run: npm run engagement:fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ENGAGEMENT_TOKEN || github.token }}

      - name: Commit engagement data
        run: |
          if git diff --quiet -- src/data/engagement.json; then
            echo "No engagement data changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/engagement.json
            git commit -m "Update engagement stats"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
