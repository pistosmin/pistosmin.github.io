<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">pistoslog</title>
  <desc id="desc">일상과 생각, 기술 공부와 개인 작업물을 기록하는 블로그</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4ed"/>
      <stop offset="0.55" stop-color="#e8f0ea"/>
      <stop offset="1" stop-color="#dce9f7"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="170" fill="#f6d7c8" opacity="0.65" filter="url(#soft)"/>
  <circle cx="180" cy="520" r="210" fill="#9cc7b2" opacity="0.5" filter="url(#soft)"/>
  <rect x="150" y="120" width="900" height="390" rx="42" fill="#ffffff" opacity="0.5" stroke="#ffffff" stroke-width="2"/>
  <text x="210" y="282" font-family="Pretendard, Arial, sans-serif" font-size="88" font-weight="800" fill="#17211d">pistoslog</text>
  <text x="214" y="360" font-family="Pretendard, Arial, sans-serif" font-size="31" font-weight="500" fill="#49534e">일상과 생각, 기술 공부와 작업물을 차분히 쌓아두는 곳</text>
</svg>
